name: Scrape Prayer Times

on:
  schedule:
    # Runs every 6 hours: midnight, 6am, noon, 6pm (UTC)
    # That's 8pm, 2am, 8am, 2pm Toronto time (UTC-4 summer / UTC-5 winter)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scraper
        run: node scripts/scrape.js

      - name: Commit updated prayer times
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/prayer-times.json
          # Only commit if the file actually changed
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: update prayer times [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          )
